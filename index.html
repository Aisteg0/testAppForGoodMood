<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Да или Нет?</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
  <div class="hearts" id="hearts"></div>

  <header class="header">
    <span class="emoji">💕</span>
    <h1>У тебя есть важный вопрос...</h1>
    <p class="subtitle" id="subtitle">Выбери ответ честно!</p>
  </header>

  <main class="game" id="game">
    <div class="buttons">
      <button class="btn btn-yes" id="btnYes">Да! 💖</button>
      <button class="btn btn-no" id="btnNo">Нет</button>
    </div>
  </main>

  <section class="result hidden" id="result">
    <div class="result-card">
      <span class="result-emoji">🎉</span>
      <h2>Я так и знал(а)!</h2>
      <p>Ты выбрал(а) правильный ответ 💕</p>
      <button class="btn btn-yes" id="btnAgain">Ещё раз?</button>
    </div>
  </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
